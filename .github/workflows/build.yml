name: Build
on: push
jobs:
  test:
    runs-on: buildjet-4vcpu-ubuntu-2204-arm
    name: Test
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/build
        with:
          target: stable
      - uses: actions/upload-artifact@v3
        with:
          name: neovim
          path: neovim/build/bin
